run:
  timeout: 5m
  tests: true

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gofmt
    - goimports
    - gocritic
    - misspell
    - unconvert
    - unused

linters-settings:
  goimports:
    local-prefixes: copilot-go-advanced
  gocritic:
    enabled-tags:
      - diagnostic
      - style

issues:
  exclude-rules:
    # Ignore errors in test files for brevity
    - path: _test\.go
      linters:
        - errcheck
