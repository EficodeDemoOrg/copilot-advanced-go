root = "."
tmp_dir = "bin"

[build]
  cmd = "go build -o ./bin/server ./cmd/server"
  bin = "./bin/server"
  delay = 1000
  exclude_dir = ["bin", "public", "docs", "tests"]
  include_ext = ["go"]
  kill_delay = "0s"
  rerun = false
  rerun_delay = 500

[log]
  main_only = false
  time = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
